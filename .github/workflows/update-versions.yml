name: Daily Software Version Update

on:
  schedule:
    - cron: '0 0 * * *' # Executes daily at midnight
  workflow_dispatch: # Allows you to run it manually from the GitHub Actions tab

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to push changes back to the repository
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          
      - name: Fetch Latest Software Versions
        run: node scripts/update-versions.js
        
      - name: Commit and Push Matrix Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/versions.json
          git diff-index --quiet HEAD || (git commit -m "chore: automated daily ecosystem software version update" && git push)